<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>C64 Emulator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
    background: #000;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: monospace;
    color: #aaa;
    overflow: hidden;
}
#status {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    font-size: 14px;
    color: #6af;
    z-index: 10;
}
#status .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid #333;
    border-top-color: #6af;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }
#c64container {
    position: relative;
    width: 403px;
    height: 284px;
    display: none; /* shown once booted */
}
#c64container canvas {
    image-rendering: pixelated;
}
#info {
    position: absolute;
    bottom: 6px;
    right: 8px;
    font-size: 10px;
    color: #444;
    pointer-events: none;
}
#toolbar {
    position: absolute;
    top: 6px;
    right: 6px;
    display: flex;
    gap: 4px;
    z-index: 20;
}
#toolbar button {
    background: rgba(0,0,0,0.7);
    border: 1px solid #444;
    color: #aaa;
    font-size: 10px;
    padding: 2px 6px;
    cursor: pointer;
    border-radius: 2px;
}
#toolbar button:hover { border-color: #888; color: #fff; }
#error {
    display: none;
    text-align: center;
    color: #f66;
    padding: 20px;
}
</style>
</head>
<body>

<div id="status">
    <div class="spinner"></div><br>
    <span id="status-text">Starting C64&hellip;</span>
</div>

<div id="error"></div>

<div id="c64container" tabindex="0">
    <div id="toolbar">
        <button id="btn-reset" title="Reset C64">RST</button>
        <button id="btn-pause" title="Pause/Resume">&#9646;&#9646;</button>
    </div>
    <div id="info">jsc64</div>
</div>

<!-- jsc64 dependencies: set basepath before loading classes -->
<script>
var JSC64_BASEPATH = '/vendor/jsc64/js/';
</script>
<script src="/vendor/jquery-3.7.1/jquery-3.7.1.min.js"></script>
<script src="/vendor/jsc64/js/jquery.jsc64classes.js"></script>
<script src="/vendor/jsc64/js/jquery.jsc64.js"></script>

<script>
(function () {
    var params        = new URLSearchParams(window.location.search);
    var fileId        = params.get('file_id');
    var prgName       = params.get('prg');
    var shareArea     = params.get('share_area');
    var shareFilename = params.get('share_filename');
    var paused   = false;
    var instance = null;

    function setStatus(msg) {
        document.getElementById('status-text').textContent = msg;
    }

    function showError(msg) {
        document.getElementById('status').style.display = 'none';
        var err = document.getElementById('error');
        err.textContent = msg;
        err.style.display = 'block';
    }

    function loadPrgBytes(prgEntry) {
        try {
            // Decode base64 payload (load address already stripped by API)
            var b64    = prgEntry.data_b64;
            var binary = atob(b64);
            var bytes  = new Uint8Array(binary.length);
            for (var i = 0; i < binary.length; i++) {
                bytes[i] = binary.charCodeAt(i);
            }

            var loadAddress = prgEntry.load_address;
            var mem = instance._mem;
            var cpu = instance._cpu;

            // Write into emulator memory
            var addr = loadAddress;
            for (var j = 0; j < bytes.length; j++) {
                mem.write(addr++, bytes[j]);
            }

            if (loadAddress === 0x0801) {
                // BASIC program: update end-of-BASIC pointer and inject RUN
                var endAddr = loadAddress + bytes.length;
                mem.write(0x002d, endAddr & 0xff);
                mem.write(0x002e, (endAddr >> 8) & 0xff);
                mem.write(0x002f, endAddr & 0xff);
                mem.write(0x0030, (endAddr >> 8) & 0xff);
                mem.write(0x0031, endAddr & 0xff);
                mem.write(0x0032, (endAddr >> 8) & 0xff);

                var charsInBuffer = mem.read(0xc6);
                if (charsInBuffer < mem.read(0x0289) - 4) {
                    var kbBuf = 0x0277 + charsInBuffer + 1;
                    mem.write(kbBuf++, 82);  // R
                    mem.write(kbBuf++, 85);  // U
                    mem.write(kbBuf++, 78);  // N
                    mem.write(kbBuf++, 13);  // Return
                    mem.write(0xc6, charsInBuffer + 5);
                }
            } else {
                // Machine code: jump to load address
                cpu.pc = loadAddress;
            }

            // Show emulator, hide status
            document.getElementById('status').style.display = 'none';
            document.getElementById('c64container').style.display = 'block';
            document.getElementById('c64container').focus();

            document.title = prgName || 'C64 Emulator';
        } catch (e) {
            showError('Failed to load PRG: ' + e.message);
        }
    }

    function fetchAndLoad() {
        if (!fileId) {
            showError('No file_id specified.');
            return;
        }

        setStatus('Loading ' + (prgName || 'PRG') + '\u2026');

        var prgsUrl = '/api/files/' + fileId + '/prgs';
        if (shareArea && shareFilename) {
            prgsUrl += '?share_area=' + encodeURIComponent(shareArea)
                     + '&share_filename=' + encodeURIComponent(shareFilename);
        }
        fetch(prgsUrl, {credentials: 'same-origin'})
            .then(function (r) {
                if (!r.ok) throw new Error('API error ' + r.status);
                return r.json();
            })
            .then(function (data) {
                if (!data.prgs || !data.prgs.length) {
                    showError('No PRG files found.');
                    return;
                }
                var prg = null;
                if (prgName) {
                    for (var i = 0; i < data.prgs.length; i++) {
                        if (data.prgs[i].name === prgName) { prg = data.prgs[i]; break; }
                    }
                }
                if (!prg) prg = data.prgs[0];
                loadPrgBytes(prg);
            })
            .catch(function (e) {
                showError('Failed to fetch PRG: ' + e.message);
            });
    }

    $(document).ready(function () {
        // Give the emulator a fresh keyboard target by focusing the container
        $('#c64container').jsc64($('#c64container'));
        instance = $('#c64container').jsc64GetInstance();

        // Wait for C64 to finish booting (~2 s), then load the PRG
        setStatus('Booting C64\u2026');
        setTimeout(fetchAndLoad, 2000);

        // Toolbar buttons
        document.getElementById('btn-reset').addEventListener('click', function () {
            instance._cpu.reset();
        });
        document.getElementById('btn-pause').addEventListener('click', function () {
            $('#c64container').jsc64Pause();
            paused = !paused;
            this.textContent = paused ? '\u25BA' : '\u2016';
        });
    });
})();
</script>
</body>
</html>
