[Definition]
# Match BinktermPHP telnet connection rate limit rejections, for example:
# [2026-03-19 02:12:09] [1441153] [INFO] Rate limit exceeded for 66.205.238.49 - connection rejected
failregex = ^\[[^\]]+\]\s+\[\d+\]\s+\[INFO\]\s+Rate limit exceeded for (?:\[<HOST>\]|<HOST>) - connection rejected$

ignoreregex =
