# Match BinktermPHP telnet ESC anti-bot challenge failures, for example:
# [2026-03-19 02:12:09] [1441153] [INFO] Bot/timeout on ESC challenge from 66.205.238.49:45072 - connection dropped
failregex = ^\[[^\]]+\]\s+\[\d+\]\s+\[INFO\]\s+Bot/timeout on ESC challenge from (?:\[<HOST>\]|<HOST>):\d+\s+\S+\s+connection dropped$

